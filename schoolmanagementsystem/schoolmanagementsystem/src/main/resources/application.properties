spring.application.name=school management system

# Server Configuration
server.port=8080

spring.datasource.url=jdbc:mysql://localhost:3306/school_management_systems?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=Designing@65
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ============================================================
# JPA / HIBERNATE
# ============================================================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=true

# Access token (short-lived, 15 minutes)
app.jwt.access-token.secret=${JWT_ACCESS_SECRET:mySecretKeyWithAtLeast32CharactersLongForHS256}
app.jwt.access-token.expiration-ms=900000

# Refresh token (long-lived, 7 days)
app.jwt.refresh-token.secret=${JWT_REFRESH_SECRET:anotherStrongSecretKeyWithAtLeast32Chars}
app.jwt.refresh-token.expiration-ms=604800000

logging.level.org.springframework.security=DEBUG
logging.level.com.school=DEBUG


# File upload limits
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB


logging.level.org.springframework.web=DEBUG
#logging.level.com.school=DEBUG
logging.level.org.hibernate.SQL=DEBUG

